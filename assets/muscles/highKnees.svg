<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 520" role="img" aria-labelledby="title desc">
  <title id="title">High Knees target muscles</title>
  <desc id="desc">Front and back body diagrams highlighting the core, hip flexors, quadriceps, calves and secondary glutes.</desc>
  <defs>
    <linearGradient id="panel" x1="0" y1="0" x2="0" y2="1"><stop stop-color="#17191d"/><stop offset="1" stop-color="#090a0c"/></linearGradient>
    <linearGradient id="skin" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#e6e8ea"/><stop offset=".55" stop-color="#aeb4ba"/><stop offset="1" stop-color="#767e86"/></linearGradient>
    <linearGradient id="muscle" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#ff6a57"/><stop offset=".55" stop-color="#d72f32"/><stop offset="1" stop-color="#8d1119"/></linearGradient>
    <filter id="shadow"><feDropShadow dx="0" dy="4" stdDeviation="6" flood-opacity=".35"/></filter>
  </defs>
  <rect x="4" y="4" width="632" height="512" rx="30" fill="url(#panel)" stroke="#d7d9dc" stroke-width="4"/>
  <text x="320" y="46" fill="#fff" font-family="Arial,Helvetica,sans-serif" font-weight="700" font-size="28" text-anchor="middle">TARGET MUSCLES</text>
  <g transform="translate(72 70)" filter="url(#shadow)">
    <text x="112" y="22" fill="#cdd2d7" font-family="Arial,Helvetica,sans-serif" font-size="16" text-anchor="middle">FRONT</text>
    <g stroke="#5f6870" stroke-width="3" stroke-linejoin="round">
      <ellipse cx="112" cy="58" rx="31" ry="38" fill="url(#skin)"/>
      <path d="M92 92 Q112 82 132 92 L154 150 Q145 196 139 226 L85 226 Q78 190 70 150Z" fill="url(#skin)"/>
      <path d="M74 112 L45 131 L26 207 L47 214 L68 157 L86 145Z" fill="url(#skin)"/>
      <path d="M150 112 L179 131 L198 207 L177 214 L156 157 L138 145Z" fill="url(#skin)"/>
      <path d="M87 224 L72 320 L79 411 L105 411 L110 330 L114 247Z" fill="url(#skin)"/>
      <path d="M137 224 L152 320 L145 411 L119 411 L114 330 L110 247Z" fill="url(#skin)"/>
    </g>
    <!-- core -->
    <path d="M96 126 Q112 118 128 126 L130 184 Q126 208 112 220 Q98 208 94 184Z" fill="url(#muscle)" opacity=".93"/>
    <g stroke="#ff9c8f" stroke-width="2" opacity=".7"><path d="M112 128V216"/><path d="M96 151H128"/><path d="M95 177H129"/><path d="M99 201H125"/></g>
    <!-- hip flexors -->
    <path d="M92 208 Q103 204 111 218 L102 250 L87 244Z" fill="url(#muscle)"/>
    <path d="M132 208 Q121 204 113 218 L122 250 L137 244Z" fill="url(#muscle)"/>
    <!-- quads -->
    <path d="M83 244 Q101 238 108 255 L104 324 Q92 343 76 326 L72 278Z" fill="url(#muscle)"/>
    <path d="M141 244 Q123 238 116 255 L120 324 Q132 343 148 326 L152 278Z" fill="url(#muscle)"/>
    <!-- calves -->
    <path d="M78 329 Q96 322 102 343 L99 393 Q91 409 80 396 L76 353Z" fill="url(#muscle)"/>
    <path d="M146 329 Q128 322 122 343 L125 393 Q133 409 144 396 L148 353Z" fill="url(#muscle)"/>
  </g>
  <g transform="translate(350 70)" filter="url(#shadow)">
    <text x="112" y="22" fill="#cdd2d7" font-family="Arial,Helvetica,sans-serif" font-size="16" text-anchor="middle">BACK</text>
    <g stroke="#5f6870" stroke-width="3" stroke-linejoin="round">
      <ellipse cx="112" cy="58" rx="31" ry="38" fill="url(#skin)"/>
      <path d="M92 92 Q112 82 132 92 L154 150 Q145 196 139 226 L85 226 Q78 190 70 150Z" fill="url(#skin)"/>
      <path d="M74 112 L45 131 L26 207 L47 214 L68 157 L86 145Z" fill="url(#skin)"/>
      <path d="M150 112 L179 131 L198 207 L177 214 L156 157 L138 145Z" fill="url(#skin)"/>
      <path d="M87 224 L72 320 L79 411 L105 411 L110 330 L114 247Z" fill="url(#skin)"/>
      <path d="M137 224 L152 320 L145 411 L119 411 L114 330 L110 247Z" fill="url(#skin)"/>
    </g>
    <!-- secondary glutes -->
    <ellipse cx="96" cy="236" rx="22" ry="19" fill="url(#muscle)" opacity=".68"/>
    <ellipse cx="128" cy="236" rx="22" ry="19" fill="url(#muscle)" opacity=".68"/>
    <!-- calves -->
    <path d="M78 329 Q96 322 102 343 L99 393 Q91 409 80 396 L76 353Z" fill="url(#muscle)"/>
    <path d="M146 329 Q128 322 122 343 L125 393 Q133 409 144 396 L148 353Z" fill="url(#muscle)"/>
  </g>
  <text x="320" y="484" fill="#fff" font-family="Arial,Helvetica,sans-serif" font-size="19" text-anchor="middle">Core • Hip flexors • Quadriceps • Calves</text>
  <text x="320" y="507" fill="#aeb5bc" font-family="Arial,Helvetica,sans-serif" font-size="13" text-anchor="middle">Glutes assist with stability and drive</text>
</svg>
